        <script>
    (function() {
    // 1. 判定対象のパスを定義
    const TARGET_DIR = "z[dev--tool]";
    const ENCODED_DIR = "z%5Bdev--tool%5D";
    const HOME_URL = "/";
    const COOKIE_NAME = "dev_access_allowed";
    const CORRECT_PILOT = "devtool-legallife-develop";

    const currentPath = window.location.pathname;

    // 2. 現在のURLがターゲットディレクトリ配下かチェック
    if (currentPath.includes(TARGET_DIR) || currentPath.includes(ENCODED_DIR)) {
        
        // 3. サブディレクトリ(/**/)への直接アクセスを直下にリダイレクト
        // 末尾が / で終わっていない、または直下（index.html等）ではない場合
        const isExactRoot = currentPath.endsWith(TARGET_DIR + "/") || 
                            currentPath.endsWith(ENCODED_DIR + "/") ||
                            currentPath.endsWith("index.html");

        if (!isExactRoot) {
            window.location.replace("/" + TARGET_DIR + "/");
            return;
        }

        // 4. Cookieの確認
        const isAuthorized = document.cookie.split('; ').find(row => row.trim().startsWith(COOKIE_NAME + '=true'));

        if (!isAuthorized) {
            // 5. パスワード入力
            const userInput = prompt("please touch EnterKey");

            if (userInput === CORRECT_PILOT) {
                // 成功：Cookieを付与
                document.cookie = `${COOKIE_NAME}=true; path=/; SameSite=Lax`;
                console.log("認証成功");
            } else {
                // 失敗：履歴を残さずホームへ飛ばす
                window.location.replace(HOME_URL);
            }
        }
    }
})();
