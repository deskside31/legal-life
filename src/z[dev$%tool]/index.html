        <script>
            (function() {
    const AUTH_PATH = "/z[dev$%tool]/";
    const HOME_URL = "https://legal-life.pages.dev/";
    const COOKIE_NAME = "dev_access_allowed";
    const CORRECT_PASSWORD = "your_password_here"; // ここにパスワードを設定

    // 現在のパスが制限対象ディレクトリか確認
    if (window.location.pathname.startsWith(AUTH_PATH)) {
        
        // 1. サブディレクトリ(/**/)への直接アクセスをルートに飛ばす処理
        // 例: /z[dev$%tool]/page1 -> /z[dev$%tool]/ へ移動
        if (window.location.pathname !== AUTH_PATH) {
            window.location.replace(AUTH_PATH);
            return;
        }

        // 2. Cookieの確認
        const isAuthorized = document.cookie.split('; ').find(row => row.startsWith(COOKIE_NAME + '=true'));

        if (!isAuthorized) {
            // 3. パスワード入力
            const userInput = prompt("パスワードを入力してください:");

            if (userInput === CORRECT_PASSWORD) {
                // 成功：Cookieを付与（有効期限1日、パス指定）
                document.cookie = `${COOKIE_NAME}=true; path=/; max-age=86400; SameSite=Strict`;
                console.log("Access Granted");
            } else {
                // 失敗：履歴を残さずホームへ飛ばす
                alert("パスワードが違います。");
                window.location.replace(HOME_URL);
            }
        }
    }
})();
