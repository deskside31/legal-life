        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const trigger = document.getElementById('sitemap-trigger');
                const secretLinks = document.querySelectorAll('.is-hidden');
                let tapCount = 0;
                let lastTapTime = 0;

                if (trigger) {
                    trigger.addEventListener('click', () => {
                        const currentTime = new Date().getTime();
                        const tapInterval = currentTime - lastTapTime;

                        // 0.5秒以内の連続タップか判定
                        if (tapInterval < 500) {
                            tapCount++;
                        } else {
                            tapCount = 1;
                        }

                        lastTapTime = currentTime;

                        // 5回連続タップで実行
                        if (tapCount === 5) {
                            secretLinks.forEach(link => {
                                link.classList.remove('is-hidden');
                                link.classList.add('is-show-secret');
                            });
                            tapCount = 0; // カウントリセット
                        }
                    });
                }
            });
        </script>
