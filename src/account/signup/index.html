<!doctype html>
<html lang="ja">
    <head>
        <title>アカウント作成|legal&life</title>
        <link rel="icon" type="image/png" href="/assets/images/favicon.png">
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "アカウント作成|legal&life",
            "url": "https://legal-life.pages.dev/account/signup"
        }
        </script>
        <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta name="viewport" content="target-densitydpi=device-dpi, width=device-width, maximum-scale=1.0, user-scalable=yes">
        <meta property="og:title" content="アカウント作成|legal&life">
        <meta property="og:image" content="https://github.com/deskside31/legal-life/blob/main/src/assets/images/share_logo.png?raw=true">
        <meta property="og:type" content="website">
        <meta charset="UTF-8">
        <link rel="stylesheet" href="/assets/css/main.css">
        <link rel="stylesheet" href="/assets/css/account.css">
        <meta name="google-site-verification" content="y9-tMPUhLn1mNcfJEvFTnHLSDs_QGNIKW30sms3Tkvs" />
    </head>
    <body class="account-page">
        <main>
            <div class="account-container">
                <h1 class="account-title">アカウントを作成</h1>
                <p class="account-subtitle">legal&life に参加する</p>
            
                <!-- Google OneTap -->
                <div id="google-onetap-container" style="margin-bottom:12px;"></div>
            
                <!-- Googleボタン -->
                <button id="google-signup-btn" class="btn-google">
                    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-3.59-13.43-8.71l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                    Googleで登録
                </button>
                <p id="google-error" class="settings-msg error" style="display:none;"></p>
            
                <div class="divider">または</div>
            
                <div class="form-group">
                    <label class="form-label" for="signup-name">お名前</label>
                    <input id="signup-name" type="text" class="form-input" placeholder="氏名またはニックネーム" autocomplete="name">
                </div>
                <div class="form-group">
                    <label class="form-label" for="signup-email">メールアドレス</label>
                    <input id="signup-email" type="email" class="form-input" placeholder="example@mail.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label" for="signup-password">パスワード</label>
                    <input id="signup-password" type="password" class="form-input" placeholder="6文字以上" autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label class="form-label" for="signup-password-confirm">パスワード（確認）</label>
                    <input id="signup-password-confirm" type="password" class="form-input" placeholder="もう一度入力" autocomplete="new-password">
                </div>
                <p style="font-size:0.78rem;color:#888;margin:4px 0 16px;line-height:1.5;">
                    登録することで <a href="/law/terms/" style="color:var(--primary-dark)">利用規約</a> および
                    <a href="/law/privacy/" style="color:var(--primary-dark)">プライバシーポリシー</a> に同意したものとみなされます。
                </p>
                <p id="signup-msg" class="settings-msg"></p>
                <button id="signup-submit" class="btn-primary">作成する</button>
            
                <div class="link-group" style="margin-top:20px;">
                    <a href="/account/login" class="link-item">すでにアカウントをお持ちの方</a>
                </div>
                <div class="link-group" style="margin-top:10px;">
                    <a href="/" class="link-item" style="color:#888;font-weight:400;">ホームへ戻る</a>
                </div>
            </div>
        </main>

        <!-- Google Identity Services (OneTap・ログインページのみ) -->
        <script src="https://accounts.google.com/gsi/client" async defer></script>
        <script type="module" src="/assets/js/important.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
        <script type="module" src="/assets/js/account.js"></script>
        <script src="/assets/js/access-log.js"></script>
    </body>
</html>
