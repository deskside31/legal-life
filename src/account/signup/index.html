<html>
<!doctype html>
<html lang="ja">
    <head>
        <title>アカウント作成|legal&life</title>
        <link rel="icon" type="image/png" href="/assets/images/favicon.png">
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "アカウント作成|legal&life",
            "url": "https://legal-life.pages.dev/account/signup"
        }
        </script>
        <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta name="viewport" content="target-densitydpi=device-dpi, width=device-width, maximum-scale=1.0, user-scalable=yes">
        <meta property="og:title" content="アカウント作成|legal&life">
        <meta property="og:image" content="https://github.com/deskside31/legal-life/blob/main/src/assets/images/share_logo.png?raw=true">
        <meta property="og:type" content="website">
        <meta charset="UTF-8">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/assets/css/main.css">
        <link rel="stylesheet" href="/assets/css/account.css">
        <meta name="google-site-verification" content="y9-tMPUhLn1mNcfJEvFTnHLSDs_QGNIKW30sms3Tkvs" />
    </head>
    <body>
        <div id="header"></div>
        <main>
            <div class="account-container">
                    <h1 class="home-title">アカウントを作成</h1>
                    <p class="subtitle">legal&life Platform を利用するための以下の情報を入力してください</p>

                    <form action="/auth/signup" method="POST">
                        <div class="form-group">
                            <label class="form-label" for="username">お名前</label>
                            <input type="text" id="username" name="username" class="form-input" placeholder="氏名またはニックネーム" required autofocus>
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="email">メールアドレス</label>
                            <input type="email" id="email" name="email" class="form-input" placeholder="example@mail.com" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label" for="password">パスワード</label>
                            <input type="password" id="password" name="password" class="form-input" placeholder="8文字以上の英数字" required minlength="8">
                        </div>

                        <div class="form-group">
                            <label class="form-label" for="password-confirm">パスワード（確認）</label>
                            <input type="password" id="password-confirm" name="password-confirm" class="form-input" required minlength="8">
                        </div>

                        <p class="terms-text">
                            [作成] をクリックすることで、当サイトの<a href="/law/terms">利用規約</a>および<a href="/law/privacy">プライバシーポリシー</a>に同意したものとみなされます。
                        </p>

                        <button type="submit" class="btn-primary">作成</button>
                    </form>

                    <div class="divider">または</div>

                    <button type="button" class="google-btn" id="google-signup-btn">
                        <svg class="google-icon" viewBox="0 0 24 24" width="18" height="18">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/>
                        </svg>
                        Googleアカウントで作成
                    </button>

                    <div class="link-group">
                        <a href="/account/login" class="link-item">すでにアカウントをお持ちの方</a>
                    </div>
                </div>
        </main>
        <div id="footer"></div>
        <script type="module" src="/assets/js/important.js"></script>
        <script src="/assets/js/account.js"></script>
        <script src="/assets/js/access-log.js"></script>
    </body>
</html>
