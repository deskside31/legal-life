<!doctype html>
<html lang="ja">
    <head>
        <title>アカウント設定|legal&life</title>
        <link rel="icon" type="image/png" href="/assets/images/favicon.png">
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "アカウント設定|legal&life",
            "url": "https://legal-life.pages.dev/account/settings"
        }
        </script>
        <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta name="viewport" content="target-densitydpi=device-dpi, width=device-width, maximum-scale=1.0, user-scalable=yes">
        <meta property="og:title" content="アカウント設定|legal&life">
        <meta property="og:image" content="https://github.com/deskside31/legal-life/blob/main/src/assets/images/share_logo.png?raw=true">
        <meta property="og:type" content="website">
        <meta charset="UTF-8">
        <link rel="stylesheet" href="/assets/css/main.css">
        <link rel="stylesheet" href="/assets/css/account-shared.css">
        <link rel="stylesheet" href="/assets/css/account.css">
        <meta name="google-site-verification" content="y9-tMPUhLn1mNcfJEvFTnHLSDs_QGNIKW30sms3Tkvs" />
    </head>
    <body>
        <main>            <div class="account-container activity-wide">
                <h1 class="home-title">設定</h1>
                <p class="subtitle">legal&life Platform のアカウント設定を管理します</p>

                <!-- 設定メニューリスト -->
                <div class="settings-list">
                    <!-- 削除申請中バナー -->
                    <div id="deletion-pending-banner">
                        <p>⚠️ アカウント削除が予約されています</p>
                        <p>削除予定日: <strong id="deletion-scheduled-date"></strong></p>
                        <button id="cancel-deletion-btn" class="btn-secondary">削除をキャンセル</button>
                    </div>
                    <!-- ユーザーカード -->
                    <div id="settings-avatar-wrap"></div>
                    <p id="settings-user-name"></p>
                    <p id="settings-user-email"></p>
                    <p id="settings-user-uuid" style="font-size:11px;color:#aaa;"></p>
                    <p>最終ログイン: <span id="settings-last-signin"></span></p>
                    
                    <!-- プロフィールへの遷移 -->
                    <a href="/account/settings/profile" class="menu-item-link">
                        <div class="menu-icon-box">
                            <svg viewBox="0 0 24 24" width="24" height="24">
                                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" fill="#5f6368"/>
                            </svg>
                        </div>
                        <div class="menu-content">
                            <span class="menu-item-text">プロフィール</span>
                            <span class="menu-subtext">基本情報、学習進捗状況、アカウント削除</span>
                        </div>
                        <span class="menu-arrow">❯</span>
                    </a>

                    <!-- プライバシーへの遷移 -->
                    <a href="/account/settings/privacy" class="menu-item-link">
                        <div class="menu-icon-box">
                            <svg viewBox="0 0 24 24" width="24" height="24">
                                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" fill="#5f6368"/>
                            </svg>
                        </div>
                        <div class="menu-content">
                            <span class="menu-item-text">プライバシー</span>
                            <span class="menu-subtext">メール通知設定、ニュースレターの購読管理</span>
                        </div>
                        <span class="menu-arrow">❯</span>
                    </a>

                    <!-- セキュリティへの遷移 -->
                    <a href="/account/security" class="menu-item-link">
                        <div class="menu-icon-box">
                            <svg viewBox="0 0 24 24" width="24" height="24">
                                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zM9 8V6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9z" fill="#5f6368"/>
                            </svg>
                        </div>
                        <div class="menu-content">
                            <span class="menu-item-text">セキュリティ</span>
                            <span class="menu-subtext">パスワード、二段階認証、ログイン履歴</span>
                        </div>
                        <span class="menu-arrow">❯</span>
                    </a>

                    <!-- デバイスへの遷移 -->
                    <a href="/account/security/device/" class="menu-item-link">
                        <div class="menu-icon-box">
                            <svg viewBox="0 0 24 24" width="24" height="24">
                                <path d="M4 6h18V4H4c-1.1 0-2 .9-2 2v11H0v3h24v-3h-2V6c0-1.1-.9-2-2-2zM2 19v-2h20v2H2z" fill="#5f6368"/>
                            </svg>
                        </div>
                        <div class="menu-content">
                            <span class="menu-item-text">デバイス</span>
                            <span class="menu-subtext">現在ログイン中の端末管理、リモートログアウト</span>
                        </div>
                        <span class="menu-arrow">❯</span>
                    </a>
                </div>

                <div class="link-group">
                    <a href="/account/settings/" class="link-item">アカウント設定へ戻る</a>
                </div>
            </div>
        </main>

        <script type="module" src="/assets/js/important.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
        <script type="module" src="/assets/js/account.js"></script>
        <script src="/assets/js/access-log.js"></script>
    </body>
</html>
