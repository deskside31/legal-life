<!doctype html>
<html lang="ja">
    <head>
        <title>プロフィール|legal&life</title>
        <link rel="icon" type="image/png" href="/assets/images/favicon.png">
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "プロフィール|legal&life",
            "url": "https://legal-life.pages.dev/account/settings/profile"
        }
        </script>
        <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta name="viewport" content="target-densitydpi=device-dpi, width=device-width, maximum-scale=1.0, user-scalable=yes">
        <meta property="og:title" content="プロフィール|legal&life">
        <meta property="og:image" content="https://github.com/deskside31/legal-life/blob/main/src/assets/images/share_logo.png?raw=true">
        <meta property="og:type" content="website">
        <meta charset="UTF-8">
        <link rel="stylesheet" href="/assets/css/main.css">
        <link rel="stylesheet" href="/assets/css/account-shared.css">
        <link rel="stylesheet" href="/assets/css/account.css">
        <meta name="google-site-verification" content="y9-tMPUhLn1mNcfJEvFTnHLSDs_QGNIKW30sms3Tkvs" />
    </head>
    <body>
        <main>            <div class="account-container activity-wide">
                <h1 class="home-title">プロフィール</h1>
                <p class="subtitle">あなたのアカウント情報と学習の進捗</p>

                <!-- アカウント基本情報 -->
                <div id="settings-avatar-wrap"></div>
                <p id="settings-user-name"></p>
                <p id="settings-user-email"></p>
                <p id="settings-user-uuid" style="font-size:11px;color:#aaa;"></p>
                <p>最終ログイン: <span id="settings-last-signin"></span></p>

                <!-- 表示名変更 -->
                <input id="profile-display-name" type="text" class="form-input">
                <p id="profile-msg" class="settings-msg"></p>
                <button id="profile-save-btn" class="btn-primary">保存</button>

                <!-- メール確認バナー -->
                <div id="email-verify-banner">
                    <p>⚠️ メールアドレスが未確認です</p>
                    <button id="send-verify-email-btn" class="btn-secondary">確認メールを再送する</button>
                    <p id="verify-email-msg" class="settings-msg"></p>
                </div>

                <div class="divider">コンテンツ進捗状況</div>

                <!-- 学習進捗一覧（未来実装予定のプレースホルダー） -->
                <div class="progress-section">
                    <div class="progress-item">
                        <div class="progress-header">
                            <span class="content-name">憲法 基礎講座</span>
                            <span class="progress-percentage">45%</span>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar" style="width: 45%;"></div>
                        </div>
                    </div>

                    <div class="progress-item">
                        <div class="progress-header">
                            <span class="content-name">民法 判例集</span>
                            <span class="progress-percentage">12%</span>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar" style="width: 12%;"></div>
                        </div>
                    </div>
                    
                    <p class="info-text" style="text-align: center; margin-top: 16px;">
                        ※詳細な進捗管理機能は順次アップデート予定です
                    </p>
                </div>

                <div class="divider">危険な操作</div>

                <!-- アカウント削除への導線 -->
                <div class="danger-zone">
                    <p class="danger-description">
                        アカウントを削除すると、すべてのデータが完全に消去されます。
                    </p>
                    <a href="/account/delete" class="btn-secondary danger-text" style="display: block; text-align: center; text-decoration: none;">
                        アカウントの削除...
                    </a>
                </div>

                <div class="link-group">
                    <a href="/account/settings" class="link-item">アカウント設定へ戻る</a>
                </div>
            </div>
        </main>

        <script type="module" src="/assets/js/important.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
        <script type="module" src="/assets/js/account.js"></script>
        <script src="/assets/js/access-log.js"></script>
    </body>
</html>
