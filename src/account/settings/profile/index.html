<!doctype html>
<html lang="ja">
    <head>
        <title>プロフィール|legal&life</title>
        <link rel="icon" type="image/png" href="/assets/images/favicon.png">
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "プロフィール|legal&life",
            "url": "https://legal-life.pages.dev/account/settings/profile"
        }
        </script>
        <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta name="viewport" content="target-densitydpi=device-dpi, width=device-width, maximum-scale=1.0, user-scalable=yes">
        <meta property="og:title" content="プロフィール|legal&life">
        <meta property="og:image" content="https://github.com/deskside31/legal-life/blob/main/src/assets/images/share_logo.png?raw=true">
        <meta property="og:type" content="website">
        <meta charset="UTF-8">
        <link rel="stylesheet" href="/assets/css/main.css">
        <link rel="stylesheet" href="/assets/css/account.css">
        <meta name="google-site-verification" content="y9-tMPUhLn1mNcfJEvFTnHLSDs_QGNIKW30sms3Tkvs" />
    </head>
    <body class="account-page">
        <main>
            <div class="account-container">
                <a href="/account/settings/" class="back-link">← アカウント設定に戻る</a>
                <h1 class="account-title">プロフィール</h1>
            
                <!-- アバター -->
                <div class="profile-avatar-wrap">
                    <div id="profile-avatar">
                        <div class="user-info-avatar-placeholder">👤</div>
                    </div>
                </div>
            
                <!-- #11 リスト形式の情報表示 -->
                <ul class="profile-info-list">
                    <li class="profile-info-item">
                        <span class="profile-info-label">ユーザー名</span>
                        <span class="profile-info-value" id="profile-name-value">読み込み中...</span>
                        <div class="profile-info-actions">
                            <button id="edit-displayname-btn" class="edit-name-btn">編集</button>
                        </div>
                    </li>
                    <li class="profile-info-item">
                        <span class="profile-info-label">メールアドレス</span>
                        <span class="profile-info-value" id="profile-email-value">読み込み中...</span>
                    </li>
                    <li class="profile-info-item">
                        <span class="profile-info-label">UUID</span>
                        <span class="profile-info-value" id="profile-uuid-value" style="font-family:monospace;font-size:0.82rem;">読み込み中...</span>
                        <div class="profile-info-actions">
                            <button id="copy-uuid-btn" class="copy-uuid-btn">コピー</button>
                        </div>
                    </li>
                    <li class="profile-info-item">
                        <span class="profile-info-label">最終ログイン</span>
                        <span class="profile-info-value" id="profile-lastlogin-value">読み込み中...</span>
                    </li>
                </ul>
            
                <!-- #2 メール確認バナー -->
                <div id="email-verify-banner" class="banner banner-warn" style="display:none;">
                    <p class="banner-title">📧 メールアドレスが未確認です</p>
                    <p style="font-size:0.83rem;">一部のセキュリティ機能はメール確認後に利用できます。</p>
                    <button id="send-verify-email-btn" class="btn-primary"
                            style="margin-top:10px;padding:9px;font-size:0.85rem;">
                        確認メールを再送する
                    </button>
                    <p id="verify-email-msg" class="settings-msg"></p>
                </div>
            
                <div class="section-divider">危険な操作</div>
                <a href="/account/delete" class="btn-danger"
                style="display:block;text-align:center;text-decoration:none;padding:10px;">
                    アカウントを削除する
                </a>
            
                <div class="link-group" style="margin-top:18px;">
                    <a href="/account/settings/" class="link-item">アカウント設定に戻る</a>
                </div>
            </div>
        </main>

        <script type="module" src="/assets/js/important.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
        <script type="module" src="/assets/js/account.js"></script>
        <script src="/assets/js/access-log.js"></script>
    </body>
</html>
