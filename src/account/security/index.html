<html lang="ja">
    <head>
        <title>セキュリティ|legal&life</title>

        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "セキュリティ|legal&life",
            "url": "https://legal-life.pages.dev/account/security"
        }
        </script>
        <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta name="viewport" content="target-densitydpi=device-dpi, width=device-width, maximum-scale=1.0, user-scalable=yes">
        <meta property="og:title" content="セキュリティ|legal&life">
        <meta property="og:image" content="https://github.com/deskside31/legal-life/blob/main/src/assets/images/share_logo.png?raw=true">
        <meta property="og:type" content="website">
        <meta charset="UTF-8">
        <link rel="stylesheet" href="/assets/css/main.css">
        <link rel="stylesheet" href="/assets/css/account-shared.css">
        <link rel="stylesheet" href="/assets/css/account.css">
        <meta name="google-site-verification" content="y9-tMPUhLn1mNcfJEvFTnHLSDs_QGNIKW30sms3Tkvs" />
    </head>
    <body>
        <main>            <div class="account-container">
                <h1 class="home-title">セキュリティ</h1>
                <p class="subtitle">アカウントを保護するための設定と管理</p>

                <div class="settings-list">
                    <!-- ログインとパスワード -->
                    <a href="/account/security/pass" class="menu-item-link">
                        <div class="menu-content">
                            <span class="menu-item-text">パスワード</span>
                            <span id="password-status-badge"></span>
                        </div>
                        <span class="menu-arrow">❯</span>
                    </a>

                    <!-- 二段階認証 -->
                    <a href="/account/security/2fa" class="menu-item-link">
                        <div class="menu-content">
                            <span class="menu-item-text">二段階認証</span>
                        <span id="2fa-status-badge" class="status-badge disabled">無効</span>
                        </div>
                        <span class="menu-arrow">❯</span>
                    </a>

                    <!-- ログイン方法 -->
                    <a href="/account/security/methods/" class="menu-item-link">
                        <div class="menu-content">
                            <span class="menu-item-text">ログイン方法</span>
                            <span class="menu-subtext">メールアドレス, Googleアカウント</span>
                        </div>
                        <span class="menu-arrow">❯</span>
                    </a>
                </div>

                <div class="divider">アクティビティ</div>

                <div class="settings-list">
                    <!-- 最近のアクティビティ -->
                    <a href="/account/security/activity" class="menu-item-link">
                        <div class="menu-content">
                            <span class="menu-item-text">最近のアクティビティ</span>
                            <span class="menu-subtext">サインインや変更履歴の確認</span>
                        </div>
                        <span class="menu-arrow">❯</span>
                    </a>

                    <!-- デバイス管理 -->
                    <a href="/account/security/device/" class="menu-item-link">
                        <div class="menu-content">
                            <span class="menu-item-text">ログイン中のデバイス</span>
                            <span class="menu-subtext">2台のデバイスでログイン中</span>
                            最終ログイン: <span id="last-signin-date"></span>
                        </div>
                        <span class="menu-arrow">❯</span>
                    </a>
                </div>

                <div class="link-group">
                    <a href="/account/settings" class="link-item">アカウント設定へ戻る</a>
                </div>
            </div>
        </main>

        <script type="module" src="/assets/js/important.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
        <script type="module" src="/assets/js/account.js"></script>
        <script src="/assets/js/access-log.js"></script>
