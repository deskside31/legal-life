    <body>
        <div id="header"></div>
        <main>
            <div class="account-container">
                <h1 class="home-title">アカウント連携</h1>
                <p class="subtitle">サインインに使用するアカウントを管理します</p>

                <div class="method-list">
                    <!-- メールアドレス -->
                    <div class="method-item">
                        <div class="method-icon-wrap">
                            <svg viewBox="0 0 24 24" width="24" height="24">
                                <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="#5f6368"/>
                            </svg>
                        </div>
                        <div class="method-info">
                            <div class="method-name">メールアドレスとパスワード</div>
                            <p class="method-meta">example@mail.com</p>
                        </div>
                        <div class="method-status">
                            <span class="status-badge-small">連携済み</span>
                        </div>
                    </div>

                    <!-- Google連携 -->
                    <div class="method-item">
                        <div class="method-icon-wrap">
                            <svg viewBox="0 0 24 24" width="24" height="24">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"/>
                            </svg>
                        </div>
                        <div class="method-info">
                            <div class="method-name">Google アカウント</div>
                            <p class="method-meta">Googleでサインインできます</p>
                        </div>
                        <div class="method-action">
                            <!-- 連携済みなら「解除」、未連携なら「連携する」などのボタンを想定 -->
                            <button type="button" class="btn-text-only">解除</button>
                        </div>
                    </div>
                </div>

                <div class="info-section" style="margin-top: 32px;">
                    <p class="info-text">
                        他の認証サービスを連携させると、万が一パスワードを忘れた場合でもアカウントを復旧しやすくなります。
                    </p>
                </div>

                <div class="link-group">
                    <a href="/account/security" class="link-item">セキュリティ設定へ戻る</a>
                </div>
            </div>
