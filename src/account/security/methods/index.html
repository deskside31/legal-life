<!doctype html>
<html lang="ja">
    <head>
        <title>アカウント連携|legal&life</title>
        <link rel="icon" type="image/png" href="/assets/images/favicon.png">
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "アカウント連携|legal&life",
            "url": "https://legal-life.pages.dev/account/security/methods"
        }
        </script>
        <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta name="viewport" content="target-densitydpi=device-dpi, width=device-width, maximum-scale=1.0, user-scalable=yes">
        <meta property="og:title" content="アカウント連携|legal&life">
        <meta property="og:image" content="https://github.com/deskside31/legal-life/blob/main/src/assets/images/share_logo.png?raw=true">
        <meta property="og:type" content="website">
        <meta charset="UTF-8">
        <link rel="stylesheet" href="/assets/css/main.css">
        <link rel="stylesheet" href="/assets/css/account-shared.css">
        <link rel="stylesheet" href="/assets/css/account.css">
        <meta name="google-site-verification" content="y9-tMPUhLn1mNcfJEvFTnHLSDs_QGNIKW30sms3Tkvs" />
    </head>
    <body>
        <main>            <div class="account-container">
                <h1 class="home-title">アカウント連携</h1>
                <p class="subtitle">サインインに使用するアカウントを管理します</p>

                <!-- Google連携 -->
                <span id="status-google" class="provider-status">確認中...</span>
                <button id="btn-google"  class="provider-link-btn">...</button>

                <!-- メール/パスワード -->
                <span id="status-email"  class="provider-status">確認中...</span>
                <button id="btn-email"   class="provider-link-btn">...</button>
                <p id="provider-msg" class="settings-msg"></p>

                <!-- メールアドレス設定カード (未設定ユーザー向け) -->
                <div id="email-setup-card">
                    <input id="set-email-input" type="email" class="form-input" placeholder="メールアドレス">
                    <p id="set-email-msg" class="settings-msg"></p>
                    <button id="set-email-btn" class="btn-primary">設定する</button>
                </div>

                <!-- パスワード設定カード (メールあり・パスワードなしユーザー向け) -->
                <div id="email-pass-section" class="hidden">
                    <input id="new-password"     type="password" class="form-input" placeholder="パスワード">
                    <input id="confirm-password" type="password" class="form-input" placeholder="確認">
                    <p id="pass-msg" class="settings-msg"></p>
                    <button id="pass-submit-btn" class="btn-primary">パスワードを設定する</button>
                </div>

                <div class="info-section" style="margin-top: 32px;">
                    <p class="info-text">
                        他の認証サービスを連携させると、万が一パスワードを忘れた場合でもアカウントを復旧しやすくなります。
                    </p>
                </div>

                <div class="link-group">
                    <a href="/account/security" class="link-item">セキュリティ設定へ戻る</a>
                </div>
            </div>
        </main>

        <script type="module" src="/assets/js/important.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
        <script type="module" src="/assets/js/account.js"></script>
        <script src="/assets/js/access-log.js"></script>
    </body>
</html>
