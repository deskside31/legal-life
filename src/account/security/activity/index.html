        {
            "@context": "https://schema.org",

        }
        </script>
        <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta name="viewport" content="target-densitydpi=device-dpi, width=device-width, maximum-scale=1.0, user-scalable=yes">
        <meta property="og:title" content="アカウントアクティビティ|legal&life">

        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=BIZ+UDGothic:wght@700&display=swap" rel="stylesheet">

        <meta name="google-site-verification" content="y9-tMPUhLn1mNcfJEvFTnHLSDs_QGNIKW30sms3Tkvs" />
    </head>
    <body>
        <div id="header"></div>
        <main>
            <div class="account-container activity-wide">
                <h1 class="home-title">最近のアクティビティ</h1>
                <p class="subtitle">過去1年間のアカウント操作ログを確認できます</p>

                <div class="activity-list">
                    <!-- アクティビティアイテム 1 -->
                    <div class="activity-item">
                        <div class="activity-icon-wrap">
                            <span class="activity-icon log-in"></span>
                        </div>
                        <div class="activity-details">
                            <div class="activity-main">
                                <span class="activity-action">サインイン</span>
                                <span class="activity-time">今日 14:20</span>
                            </div>
                            <p class="activity-info">Chrome on Windows • IP: 192.168.x.x</p>
                        </div>
                    </div>

                    <!-- アクティビティアイテム 2 -->
                    <div class="activity-item">
                        <div class="activity-icon-wrap">
                            <span class="activity-icon security-change"></span>
                        </div>
                        <div class="activity-details">
                            <div class="activity-main">
                                <span class="activity-action">二段階認証の設定変更</span>
                                <span class="activity-time">2026/05/08 10:15</span>
                            </div>
                            <p class="activity-info">Safari on iPhone • 東京, 日本</p>
                        </div>
                    </div>

                    <!-- アクティビティアイテム 3 -->
                    <div class="activity-item">
                        <div class="activity-icon-wrap">
                            <span class="activity-icon pass-change"></span>
                        </div>
                        <div class="activity-details">
                            <div class="activity-main">
                                <span class="activity-action">パスワードの変更</span>
                                <span class="activity-time">2026/04/20 18:40</span>
                            </div>
                            <p class="activity-info">Chrome on Windows • 愛知県, 日本</p>
                        </div>
                    </div>
                </div>

                <div class="activity-footer">
                    <p class="footer-note">身に覚えのない操作がある場合は、すぐにパスワードを変更してください。</p>
                    <a href="/account/security/pass" class="btn-primary-link">パスワードを変更する</a>
                </div>

                <div class="link-group">
                    <a href="/account/security" class="link-item">セキュリティ設定へ戻る</a>
                </div>
            </div>
        </main>
        <div id="footer"></div>
        <script type="module" src="/assets/js/important.js"></script>
        <script src="/assets/js/account.js"></script>
        <script src="/assets/js/access-log.js"></script>
    </body>
