<!doctype html>
<html lang="ja">
    <head>
        <title>ログイン|legal&life</title>
        <link rel="icon" type="image/png" href="/assets/images/favicon.png">
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "ログイン|legal&life",
            "url": "https://legal-life.pages.dev/account/login"
        }
        </script>
        <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta name="viewport" content="target-densitydpi=device-dpi, width=device-width, maximum-scale=1.0, user-scalable=yes">
        <meta property="og:title" content="ログイン|legal&life">
        <meta property="og:image" content="https://github.com/deskside31/legal-life/blob/main/src/assets/images/share_logo.png?raw=true">
        <meta property="og:type" content="website">
        <meta charset="UTF-8">
        <link rel="stylesheet" href="/assets/css/main.css">
        <link rel="stylesheet" href="/assets/css/account-shared.css">
        <link rel="stylesheet" href="/assets/css/account.css">
        <meta name="google-site-verification" content="y9-tMPUhLn1mNcfJEvFTnHLSDs_QGNIKW30sms3Tkvs" />
    </head>
    <body>
        <main>            <div class="account-container">
                <h1 class="home-title">ログイン</h1>
                <p class="subtitle">legal&life Platform アカウントを使用する</p>

                <!-- メールログインフォーム -->

                <input id="login-email"    type="email"    class="form-input" placeholder="メールアドレス">
                <input id="login-password" type="password" class="form-input" placeholder="パスワード">
                <p id="login-msg" class="settings-msg"></p>
                <button id="login-submit" class="btn-primary">ログイン</button>

                <div class="link-group">
                    <button id="forgot-password-btn" class="btn-text-only">パスワードをお忘れの方</button>
                </div>

                <div class="divider">または</div>

                <!-- Googleリダイレクトボタン -->
                <!-- Google OneTap コンテナ (GOOGLE_CLIENT_ID 設定時のみ有効) -->
                <div id="google-onetap-container" class="google-btn"></div>
                <p id="google-error" class="settings-msg error" style="display:none;"></p>

                <div class="link-group">
                    <button id="to-signup-btn" class="btn-text-only">アカウントを作成</button>
                </div>

                <div class="link-group">
                    <a href="/" class="link-item">ホームに戻る</a>
                </div>
            </div>
        </main>

        <!-- Google Identity Services (OneTap・ログインページのみ) -->
        <script src="https://accounts.google.com/gsi/client" async defer></script>
        <script type="module" src="/assets/js/important.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
        <script type="module" src="/assets/js/account.js"></script>
        <script src="/assets/js/access-log.js"></script>
    </body>
</html>
