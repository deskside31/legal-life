<!doctype html>
<html lang="ja">
    <head>
        <title>アカウント削除|legal&life</title>
        <link rel="icon" type="image/png" href="/assets/images/favicon.png">
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "アカウント削除|legal&life",
            "url": "https://legal-life.pages.dev/account/delete"
        }
        </script>
        <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta name="viewport" content="target-densitydpi=device-dpi, width=device-width, maximum-scale=1.0, user-scalable=yes">
        <meta property="og:title" content="アカウント削除|legal&life">
        <meta property="og:image" content="https://github.com/deskside31/legal-life/blob/main/src/assets/images/share_logo.png?raw=true">
        <meta property="og:type" content="website">
        <meta charset="UTF-8">
        <link rel="stylesheet" href="/assets/css/main.css">
        <link rel="stylesheet" href="/assets/css/account.css">
        <meta name="google-site-verification" content="y9-tMPUhLn1mNcfJEvFTnHLSDs_QGNIKW30sms3Tkvs" />
    </head>
    <body class="account-page">
        <main>
            <div class="account-container">
                <a href="/account/settings/" class="back-link">← アカウント設定に戻る</a>
                <h1 class="account-title">アカウントの削除</h1>
                <p class="account-subtitle">削除申請後、30日間はキャンセル可能です</p>
            
                <div id="delete-form-wrapper">
                    <div class="banner banner-error">
                        <p class="banner-title">⚠️ 削除前に必ずご確認ください</p>
                        <p>削除申請から30日後にすべてのデータが完全削除されます。この操作は取り消せません。</p>
                    </div>
            
                    <div class="deletion-checklist">
                        <label class="deletion-check-item">
                            <input type="checkbox" class="deletion-checkbox">
                            <span>削除後、すべてのデータ（チャット履歴・アカウント情報）は完全に消去され復元不可です</span>
                        </label>
                        <label class="deletion-check-item">
                            <input type="checkbox" class="deletion-checkbox">
                            <span>削除申請後はコンテンツの利用が制限されます</span>
                        </label>
                        <label class="deletion-check-item">
                            <input type="checkbox" class="deletion-checkbox">
                            <span>利用履歴はシステム改善のために匿名化して使用される場合があります</span>
                        </label>
                        <label class="deletion-check-item">
                            <input type="checkbox" class="deletion-checkbox">
                            <span>上記をすべて理解し、アカウントの削除を申請します</span>
                        </label>
                    </div>
            
                    <p id="delete-msg" class="settings-msg"></p>
                    <div id="delete-otp-container" style="display:none;"></div>
                    <button id="delete-execute-btn" class="btn-danger" disabled>削除を申請する</button>
                </div>
            
                <div id="delete-success" style="display:none;text-align:center;">
                    <p style="font-size:2rem;margin-bottom:12px;">✅</p>
                    <p style="font-size:1rem;font-weight:700;">削除を申請しました</p>
                    <p style="font-size:0.88rem;color:#888;margin-top:8px;line-height:1.6;">
                        30日後に完全削除されます。<br>
                        キャンセルはアカウント設定ページから可能です。
                    </p>
                    <div class="link-group" style="margin-top:20px;">
                        <a href="/" class="link-item">ホームへ戻る</a>
                    </div>
                </div>
            </div>
        </main>

        <script type="module" src="/assets/js/important.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
        <script type="module" src="/assets/js/account.js"></script>
        <script src="/assets/js/access-log.js"></script>
        <!-- 削除カウントダウン用スクリプト（簡易版） -->
        <script>
            let timeLeft = 10;
            const btn = document.getElementById('delete-btn');
            const secDisplay = document.getElementById('seconds');
            const textDisplay = document.getElementById('countdown-display');

            const timer = setInterval(() => {
                timeLeft--;
                secDisplay.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    textDisplay.innerText = "削除が可能になりました";
                    textDisplay.classList.add('ready');
                }
            }, 1000);
        </script>
    </body>
</html>
