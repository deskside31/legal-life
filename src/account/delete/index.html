<!doctype html>
<html lang="ja">
    <head>
        <title>アカウント削除|legal&life</title>
        <link rel="icon" type="image/png" href="/assets/images/favicon.png">
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "アカウント削除|legal&life",
            "url": "https://legal-life.pages.dev/account/delete"
        }
        </script>
        <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        <meta name="viewport" content="target-densitydpi=device-dpi, width=device-width, maximum-scale=1.0, user-scalable=yes">
        <meta property="og:title" content="アカウント削除|legal&life">
        <meta property="og:image" content="https://github.com/deskside31/legal-life/blob/main/src/assets/images/share_logo.png?raw=true">
        <meta property="og:type" content="website">
        <meta charset="UTF-8">
        <link rel="stylesheet" href="/assets/css/main.css">
        <link rel="stylesheet" href="/assets/css/account-shared.css">
        <link rel="stylesheet" href="/assets/css/account.css">
        <meta name="google-site-verification" content="y9-tMPUhLn1mNcfJEvFTnHLSDs_QGNIKW30sms3Tkvs" />
    </head>
    <body>
        <main>
            <div class="account-container">
                <h1 class="home-title">アカウントの削除</h1>
                <p class="subtitle">legal&life Platform アカウントを完全に削除します</p>
                <div id="delete-form-wrapper">
                    <!-- チェックリスト -->
                    <label class="deletion-check-item">
                        <input type="checkbox" class="deletion-checkbox">
                        <span>削除後すべてのデータの復元は不可能です</span>
                    </label>
                    <label class="deletion-check-item">
                        <input type="checkbox" class="deletion-checkbox">
                        <span>削除申請後はサービス利用が制限されます</span>
                    </label>
                    <label class="deletion-check-item">
                        <input type="checkbox" class="deletion-checkbox">
                        <span>利用履歴は匿名化してシステム改善に使用される場合があります</span>
                    </label>
                    <label class="deletion-check-item">
                        <input type="checkbox" class="deletion-checkbox">
                        <span>上記をすべて理解し削除を申請する</span>
                    </label>
                    <p id="delete-msg" class="settings-msg"></p>
                    <button id="delete-execute-btn" class="btn-danger" disabled>削除を申請する</button>
                </div>
                <div id="delete-success" style="display:none;">
                    ✅ 削除を申請しました。30日後に完全削除されます。
                </div>
                <div class="link-group">
                    <a href="/account/settings/profile" class="link-item">削除せずに戻る</a>
                </div>
            </div>
        </main>

        <script type="module" src="/assets/js/important.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
        <script type="module" src="/assets/js/account.js"></script>
        <script src="/assets/js/access-log.js"></script>
        <!-- 削除カウントダウン用スクリプト（簡易版） -->
        <script>
            let timeLeft = 10;
            const btn = document.getElementById('delete-btn');
            const secDisplay = document.getElementById('seconds');
            const textDisplay = document.getElementById('countdown-display');

            const timer = setInterval(() => {
                timeLeft--;
                secDisplay.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    textDisplay.innerText = "削除が可能になりました";
                    textDisplay.classList.add('ready');
                }
            }, 1000);
        </script>
    </body>
</html>
