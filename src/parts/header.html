<!-- ========== 認証モーダル ========== -->
<div id="auth-modal-overlay" class="auth-modal-overlay" style="display:none;">
    <div class="auth-modal">
        <button id="auth-modal-close" class="auth-modal-close" aria-label="閉じる">✕</button>

        <!-- 画面1: ログイン（Google + メール/PW を1画面に統合） -->
        <div id="auth-view-select" class="auth-view">
            <h2 class="auth-modal-title">ログイン / 新規登録</h2>

            <button id="auth-google-btn" class="auth-provider-btn auth-google">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20" height="20">
                Googleでログイン
            </button>

            <div class="auth-divider"><span>または</span></div>

            <p class="auth-section-label" id="auth-email-title">メールアドレスでログイン</p>

            <input id="auth-email-input" type="email" placeholder="メールアドレス" class="auth-input" autocomplete="email">
            <input id="auth-password-input" type="password" placeholder="パスワード（6文字以上）" class="auth-input" autocomplete="current-password">

            <div id="auth-name-row" style="display:none;">
                <input id="auth-name-input" type="text" placeholder="お名前（表示名）" class="auth-input" autocomplete="name">
            </div>

            <p id="auth-error-msg" class="auth-error-msg"></p>

            <button id="auth-submit-btn" class="auth-submit-btn">ログイン</button>

            <p class="auth-toggle-text" id="auth-forgot-wrap">
                <a href="javascript:void(0)" id="auth-forgot-btn">パスワードをお忘れの方はこちら</a>
            </p>
            <p class="auth-toggle-text" id="auth-to-register-wrap">
                アカウントをお持ちでない方は
                <a href="javascript:void(0)" id="auth-to-register">新規登録</a>
            </p>
            <p class="auth-toggle-text" id="auth-to-login-wrap" style="display:none;">
                すでにアカウントをお持ちの方は
                <a href="javascript:void(0)" id="auth-to-login">ログイン</a>
            </p>
        </div>

        <!-- 画面2: ログイン済み -->
        <div id="auth-view-loggedin" class="auth-view" style="display:none;">
            <img id="modal-user-avatar" src="" alt="avatar" class="modal-user-avatar">
            <p id="modal-user-name" class="modal-user-name"></p>
            <p class="auth-modal-sub">ログイン中です</p>
            <button id="modal-settings-link" class="auth-settings-btn">⚙️ アカウント設定</button>
            <button id="modal-logout-btn" class="auth-submit-btn auth-logout-btn">ログアウト</button>
        </div>

        <!-- 画面3: パスワードリセット送信完了 -->
        <div id="auth-view-reset" class="auth-view" style="display:none;">
            <h2 class="auth-modal-title">📧 メールを送信しました</h2>
            <p class="auth-modal-sub" style="margin-bottom:8px;">
                入力したメールアドレス宛にパスワード再設定のリンクを送りました。<br>
                メールをご確認ください。
            </p>
            <p id="auth-reset-email-display" style="text-align:center; font-weight:700; color:#333; margin-bottom:20px;"></p>
            <button id="auth-reset-back-btn" class="auth-submit-btn">ログイン画面に戻る</button>
        </div>
    </div>
</div>
