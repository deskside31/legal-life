    <body class="all-page">
        
        <div id="header"></div>

        <main class="chat-content">
            <div class="page-title">
                <h1>法令専門AIチャット</h1>
                <p>
                    日本の法令に関して聞かれたことに対してAIが詳しく回答します。<br>
                    履歴はご利用中の端末もしくはサーバーに自動で保存されます。
                </p>
            </div>

            <div class="chat_caution_box">
                <h3 class="chat_caution_title">⚠️ 重要な注意事項</h3>
                <ul class="chat_caution_list">
                    <li class="chat_caution_item">個人情報(氏名、住所、電話番号等)は絶対に入力しないでください</li>
                    <li class="chat_caution_item">本サービスは法的助言ではありません</li>

                </ul>
                <p class="chat_caution_footer">
                    当機能利用時は当サイト  <a href="/law/disclaimer/" class="chat_caution_link">免責事項</a>  並びに  <a href="/law/privacy/#section6" class="chat_caution_link">AI利用に関する詳細情報開示</a>  に同意したものをみなします。
                </p>
            </div>

            <div class="chat_search_info_box">
                <p class="chat_search_info_text">
                    💡 わからない法令名は
                    <a href="/content/search/" class="chat_search_info_link">法令検索</a>
                    ページで調べてみよう！
                </p>
            </div>

            <div class="chat-container">
                <div class="chat-wrapper">
                    <header class="chat-inner-header">
                        <span>法令専門AIチャット</span>
                    </header>

                    <div id="responseArea" class="chat-chat-window"></div>

                    <div class="chat-input-area">
                        <textarea id="userInput" class="chat-user-input" placeholder="AIと話すにはここに入力..."></textarea>
                        <button id="sendButton" class="chat-send-btn">送信</button>
                        <button id="clearAllButton" class="chat-clear-btn">全削除</button>
                    </div>
                </div>
            </div>
        </main>
        
        <div id="footer"></div>
        <script type="module" src="/assets/js/important.js"></script>
