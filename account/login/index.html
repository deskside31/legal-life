<main>
<div class="account-container">
    <h1 class="account-title">ログイン</h1>
    <p class="account-subtitle">legal&life アカウントにログイン</p>
 
    <!-- Google OneTap -->
    <div id="google-onetap-container" style="margin-bottom:12px;"></div>
 
    <button id="google-login-btn" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-3.59-13.43-8.71l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Googleでログイン
    </button>
    <p id="google-error" class="settings-msg error" style="display:none;"></p>
 
    <div class="divider">または</div>
 
    <div id="login-form-section">
        <div class="form-group">
            <label class="form-label" for="login-email">メールアドレス</label>
            <input id="login-email" type="email" class="form-input" placeholder="example@mail.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label class="form-label" for="login-password">パスワード</label>
            <input id="login-password" type="password" class="form-input" placeholder="パスワード" autocomplete="current-password">
        </div>
        <p id="login-msg" class="settings-msg"></p>
        <button id="login-submit" class="btn-primary" style="margin-top:6px;">ログイン</button>
        <div class="link-group" style="margin-top:12px;">
            <button id="forgot-password-btn" class="btn-text">パスワードをお忘れの方</button>
        </div>
    </div>
 
    <div id="twofa-verify-section" style="display:none;">
        <div id="twofa-panel-container"></div>
    </div>
 
    <div class="divider"></div>
    <div class="link-group">

    </div>
